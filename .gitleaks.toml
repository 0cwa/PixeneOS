title = "PixeneOS gitleaks configuration"

[extend]
useDefault = true

[[rules]]
id = "pixeneos-signing-material-path"
description = "PixeneOS AVB/OTA signing material must stay out of git"
path = '''(^|/)(\.keys(/|$)|avb\.key$|ota\.key$|ota\.crt$|avb_pkmd\.bin$)'''
tags = ["pixeneos", "signing", "key"]

[[rules]]
id = "pixeneos-base64-signing-secret"
description = "PixeneOS base64 signing secrets belong in GitHub secrets, not source files"
regex = '''(?i)\b(KEYS_AVB_BASE64|KEYS_CERT_OTA_BASE64|KEYS_OTA_BASE64|AVB_KEY|CERT_OTA|OTA_KEY)\b\s*[:=]\s*["']?([A-Za-z0-9+/]{40,}={0,2})'''
secretGroup = 2
tags = ["pixeneos", "signing", "base64"]

[[rules]]
id = "pixeneos-signing-passphrase"
description = "PixeneOS signing passphrases belong in GitHub secrets, not source files"
regex = '''(?i)\b(PASSPHRASE_AVB|PASSPHRASE_OTA)\b\s*[:=]\s*["']?([^$\s"'][^\s"']{7,})'''
secretGroup = 2
tags = ["pixeneos", "signing", "passphrase"]

[[rules]]
id = "pixeneos-private-key-block"
description = "Private key material must not be committed"
regex = '''-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----'''
tags = ["pixeneos", "signing", "private-key"]
